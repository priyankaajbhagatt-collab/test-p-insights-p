apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-p-insights-p
  labels:
    app: test-p-insights-p
    market: can
    managed-by: backstage-scaffolder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-p-insights-p
  template:
    metadata:
      labels:
        app: test-p-insights-p
        market: can
    spec:
      containers:
        - name: app
          # Placeholder until first CI build pushes a real image.
          # `nginx-unprivileged` listens on 8080 (matches Java/Python/Node runtimes).
          # CD pipeline patches `image:` to ghcr.io/priyankaajbhagatt-collab/test-p-insights-p:<sha>.
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
